# MentorHub AWS platform configuration
# Canonical source of truth (SRE). Convenience copy in mentorhub/Specifications/aws-platform.yaml for DE docs.

aws:
  primary_region: us-east-1
  recorded: 2026-06-04
  phase: dependency-move-phase-0

# CodeArtifact in Shared-Services (see DEPENDENCY_MOVE.md Phase 0.1)
codeartifact:
  account_id: 560167829275
  domain: mentor-forge
  domain_owner: 560167829275   # same as account_id
  pypi_repo: mentorhub-pypi
  npm_repo: mentorhub-npm
  region: us-east-1

# IAM Identity Center (SSO) — separate from primary_region; used only for aws sso login / configure sso
identity_center:
  sso_region: us-east-2
  sso_start_url: https://d-906780e571.awsapps.com/start
  sso_session_name: mentor-forge

# GitHub organization variables (mentor-forge → Settings → Secrets and variables → Actions → Variables)
# Set these in GitHub when Phase 0 infrastructure is ready.
github_org_variables:
  AWS_REGION: us-east-1
  AWS_SHARED_SERVICES_ACCOUNT_ID: 560167829275
  CODEARTIFACT_DOMAIN: mentor-forge
  CODEARTIFACT_PYPI_REPO: mentorhub-pypi
  CODEARTIFACT_NPM_REPO: mentorhub-npm

# Local AWS CLI SSO profile names (see CONTRIBUTING.md)
sso_profiles:
  shared_services: mentorhub-shared   # Shared-Services + Developer-Packages (or SRE)
  dev_workload: mentorhub-dev         # MentorHub-Dev + Developer (or SRE)
  default_roles:
    shared_services: Developer-Packages
    dev_workload: Developer
